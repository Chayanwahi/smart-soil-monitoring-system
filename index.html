<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Soil Monitoring System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🌱 Smart Soil Monitoring & Crop Health Alert System</h1>
        <p>IoT Based Agriculture Monitoring Dashboard</p>
    </header>

    <div class="container">

        <div class="card">
            <h2>Soil Moisture</h2>
            <p id="moisture">65%</p>
        </div>

        <div class="card">
            <h2>Plant Status</h2>
            <p id="status">Healthy 🌱</p>
        </div>

        <div class="card">
            <h2>Last Updated</h2>
            <p id="time"></p>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
